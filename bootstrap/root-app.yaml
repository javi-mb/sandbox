apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cluster-bootstrap
  namespace: openshift-gitops
spec:
  project: default
  source:
    repoURL: 'https://github.com/TU_USUARIO/TU_REPO.git'
    targetRevision: HEAD
    path: clusters/sno-lab        # <--- Apunta a la carpeta del clúster
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: openshift-gitops
  syncPolicy:
    automated:
      prune: true
      selfHeal: true